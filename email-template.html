<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin: 0; padding: 0; background-color: #FAFAFA; font-family: 'PPNeueMontreal Medium', 'Helvetica Neue', Helvetica, Arial, sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #FAFAFA;">
    <tr>
      <td align="center" style="padding: 48px 24px;">

        <table role="presentation" width="100%" style="max-width: 560px;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom: 32px; border-bottom: 1px solid #1A1A1A;">
              <span style="font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #1A1A1A;">
                Malik Kotb
              </span>
            </td>
          </tr>

          <!-- Intro -->
          <tr>
            <td style="padding: 32px 0 24px;">
              <p style="margin: 0; font-size: 13px; color: #1A1A1A; line-height: 1.6;">
                A new message from <strong>{{from_name}}</strong> has been received via your contact form. Kindly respond at your earliest convenience.
              </p>
            </td>
          </tr>

          <!-- Message card -->
          <tr>
            <td style="padding: 24px; border: 1px dashed #1A1A1A; border-radius: 2px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding-bottom: 6px;">
                    <span style="font-size: 15px; font-weight: 600; color: #1A1A1A;">{{from_name}}</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding-bottom: 16px;">
                    <span style="font-size: 12px; color: #888888; letter-spacing: 0.04em;">{{from_email}}</span>
                  </td>
                </tr>
                <tr>
                  <td>
                    <p style="margin: 0; font-size: 14px; color: #1A1A1A; line-height: 1.7;">{{message}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding-top: 32px; border-top: 1px solid #1A1A1A; margin-top: 32px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td>
                    <span style="font-size: 11px; color: #888888; letter-spacing: 0.04em;">
                      Malik Kotb &copy; 2026 &mdash; Made by me with love
                    </span>
                  </td>
                  <td align="right">
                    <span style="font-size: 11px; color: #888888; letter-spacing: 0.04em;">
                      malik-kotb.com
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
